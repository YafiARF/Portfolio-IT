<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Auto Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap");

      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
      }

      .car-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .car-card:hover {
        transform: translateY(-10px);
        box-shadow:
          0 20px 25px -5px rgba(0, 0, 0, 0.1),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }

      .image-overlay {
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.7) 0%,
          transparent 100%
        );
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .car-card:hover .image-overlay {
        opacity: 1;
      }

      .modal-enter {
        animation: fadeIn 0.3s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
          <div class="flex items-center gap-2">
            <i class="fas fa-car-side text-blue-600 text-2xl"></i>
            <span class="text-xl font-bold text-gray-800"
              >Katalog<span class="text-blue-600"> Mobil</span></span
            >
          </div>
          <div class="hidden md:flex space-x-8 text-gray-600 font-medium"></div>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <header class="bg-blue-900 text-white py-16 px-4">
      <div class="max-w-7xl mx-auto text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4">
          Temukan Mobil Impian Anda
        </h1>
        <p class="text-blue-100 text-lg max-w-2xl mx-auto">
          Koleksi mobil premium pilihan dengan performa terbaik dan desain yang
          elegan.
        </p>
      </div>
    </header>

    <!-- Catalog Section -->
    <main class="max-w-7xl mx-auto px-4 py-12">
      <div
        class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4"
      >
        <h2 class="text-2xl font-bold text-gray-800">Katalog Unggulan</h2>
        <div
          class="flex bg-white rounded-lg p-1 shadow-sm border border-gray-200"
        >
          <button
            onclick="filterCars('semua')"
            class="px-4 py-2 rounded-md text-sm font-medium hover:bg-gray-100 transition active-tab"
            id="btn-semua"
          >
            Semua
          </button>
          <button
            onclick="filterCars('Sport')"
            class="px-4 py-2 rounded-md text-sm font-medium hover:bg-gray-100 transition"
          >
            Sport
          </button>
          <button
            onclick="filterCars('SUV')"
            class="px-4 py-2 rounded-md text-sm font-medium hover:bg-gray-100 transition"
          >
            SUV
          </button>
          <button
            onclick="filterCars('Electric')"
            class="px-4 py-2 rounded-md text-sm font-medium hover:bg-gray-100 transition"
          >
            Electric
          </button>
        </div>
      </div>

      <!-- Grid Katalog -->
      <div
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"
        id="car-grid"
      >
        <!-- Data mobil akan dimasukkan di sini oleh JavaScript -->
      </div>
    </main>

    <!-- Modal Detail -->
    <div
      id="carModal"
      class="fixed inset-0 bg-black bg-opacity-75 hidden z-[60] flex items-center justify-center p-4"
    >
      <div
        class="bg-white rounded-2xl max-w-2xl w-full overflow-hidden modal-enter relative"
      >
        <button
          onclick="closeModal()"
          class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 z-10 bg-white rounded-full p-2 shadow-md"
        >
          <i class="fas fa-times"></i>
        </button>
        <div id="modalContent"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 pt-12 pb-8 mt-20">
      <div class="max-w-7xl mx-auto px-4 text-center">
        <div class="flex justify-center space-x-6 mb-8 text-gray-400">
          <a href="#" class="hover:text-blue-600 text-xl"
            ><i class="fab fa-instagram"></i
          ></a>
          <a href="#" class="hover:text-blue-600 text-xl"
            ><i class="fab fa-facebook"></i
          ></a>
          <a href="#" class="hover:text-blue-600 text-xl"
            ><i class="fab fa-twitter"></i
          ></a>
        </div>
        <p class="text-gray-500 text-sm">
          &copy; 2026 Yafi Arkan. All Right Reserved.
        </p>
      </div>
    </footer>

    <script>
      const cars = [
        {
          id: 1,
          name: "Tesla Model S",
          category: "Electric",
          price: "Rp 2.500.000.000",
          image:
            "https://images.unsplash.com/photo-1617788138017-80ad40651399?auto=format&fit=crop&q=80&w=800",
          desc: "Mobil listrik dengan akselerasi tercepat di dunia, fitur autopilot canggih, dan jangkauan baterai yang luar biasa.",
          specs: ["3.1s 0-100 km/h", "650 km Range", "All-Wheel Drive"],
        },
        {
          id: 2,
          name: "Porsche 911 Carrera",
          category: "Sport",
          price: "Rp 3.850.000.000",
          image:
            "https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=800",
          desc: "Ikon sport car sejati. Memberikan pengalaman berkendara yang murni dengan desain timeless yang melegenda.",
          specs: ["3.4s 0-100 km/h", "293 km/h Top Speed", "Flat-six Engine"],
        },
        {
          id: 3,
          name: "Range Rover Sport",
          category: "SUV",
          price: "Rp 4.200.000.000",
          image:
            "https://images.unsplash.com/photo-1606664515524-ed2f786a0bd6?auto=format&fit=crop&q=80&w=800",
          desc: "Kombinasi sempurna antara kemewahan kelas atas dan kemampuan off-road yang tangguh di segala medan.",
          specs: ["Luxury Interior", "Adaptive Dynamics", "Terrain Response 2"],
        },
        {
          id: 4,
          name: "BMW M4 Competition",
          category: "Sport",
          price: "Rp 2.100.000.000",
          image:
            "https://images.unsplash.com/photo-1617531653332-bd46c24f2068?auto=format&fit=crop&q=80&w=800",
          desc: "Performa tinggi berpadu dengan fungsionalitas harian. M4 Competition adalah puncak dari engineering divisi M.",
          specs: ["510 Horsepower", "M xDrive", "Carbon Fiber Seats"],
        },
      ];

      function displayCars(carList) {
        const grid = document.getElementById("car-grid");
        grid.innerHTML = "";

        carList.forEach((car) => {
          const card = `
                    <div class="car-card bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm group">
                        <div class="relative h-56 overflow-hidden cursor-pointer" onclick="openModal(${car.id})">
                            <img src="${car.image}" alt="${car.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="image-overlay absolute inset-0 flex items-end p-4">
                                <span class="text-white text-xs font-semibold bg-blue-600 px-3 py-1 rounded-full">Lihat Detail</span>
                            </div>
                        </div>
                        <div class="p-5">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <p class="text-xs font-bold text-blue-600 uppercase tracking-wider mb-1">${car.category}</p>
                                    <h3 class="text-lg font-bold text-gray-800">${car.name}</h3>
                                </div>
                                <button class="text-gray-300 hover:text-red-500 transition"><i class="far fa-heart"></i></button>
                            </div>
                            <div class="mt-4 pt-4 border-t border-gray-50 flex justify-between items-center">
                                <span class="text-xl font-bold text-gray-900">${car.price}</span>
                            </div>
                            <button onclick="openModal(${car.id})" class="w-full mt-4 bg-gray-900 text-white py-3 rounded-xl font-semibold hover:bg-blue-600 transition duration-300">
                                Cek Ketersediaan
                            </button>
                        </div>
                    </div>
                `;
          grid.innerHTML += card;
        });
      }

      function filterCars(category) {
        if (category === "semua") {
          displayCars(cars);
        } else {
          const filtered = cars.filter((car) => car.category === category);
          displayCars(filtered);
        }
      }

      function openModal(id) {
        const car = cars.find((c) => c.id === id);
        const modal = document.getElementById("carModal");
        const content = document.getElementById("modalContent");

        content.innerHTML = `
                <div class="md:flex">
                    <div class="md:w-1/2">
                        <img src="${car.image}" class="w-full h-full object-cover max-h-[300px] md:max-h-full">
                    </div>
                    <div class="md:w-1/2 p-8">
                        <p class="text-blue-600 font-bold text-sm uppercase mb-1">${car.category}</p>
                        <h2 class="text-3xl font-extrabold text-gray-900 mb-4">${car.name}</h2>
                        <p class="text-gray-600 leading-relaxed mb-6">${car.desc}</p>
                        
                        <div class="space-y-3 mb-8">
                            ${car.specs
                              .map(
                                (spec) => `
                                <div class="flex items-center text-sm text-gray-700">
                                    <i class="fas fa-check-circle text-green-500 mr-2"></i>
                                    ${spec}
                                </div>
                            `,
                              )
                              .join("")}
                        </div>

                        <div class="flex flex-col gap-2">
                            <p class="text-2xl font-black text-gray-900">${car.price}</p>
                            <a href="https://wa.me/#" target="_blank" class="bg-green-500 text-white text-center py-3 rounded-xl font-bold hover:bg-green-600 transition flex items-center justify-center gap-2">
                                <i class="fab fa-whatsapp text-xl"></i> Hubungi Sales
                            </a>
                        </div>
                    </div>
                </div>
            `;

        modal.classList.remove("hidden");
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        document.getElementById("carModal").classList.add("hidden");
        document.body.style.overflow = "auto";
      }

      // Tutup modal jika klik di luar box
      window.onclick = function (event) {
        const modal = document.getElementById("carModal");
        if (event.target == modal) {
          closeModal();
        }
      };

      // Tampilkan mobil pertama kali
      window.onload = () => displayCars(cars);
    </script>
  </body>
</html>
